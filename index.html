<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>Для моей любимой Светочки ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Varela+Round&display=swap');

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #ffd1dc, #ffb6c1, #ff9eb5, #ffc0cb);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            font-family: 'Varela Round', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            color: #555;
            overflow-x: hidden;
            padding-top: 20px;
            padding-bottom: 40px;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-heart {
            position: fixed;
            top: -10%;
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            z-index: 0;
            pointer-events: none;
            animation: fall linear infinite;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.8);
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.4);
            text-align: center;
            width: 90%;
            max-width: 500px;
            border: 8px solid rgba(255, 255, 255, 0.9);
            position: relative;
            z-index: 10;
            margin: 10px;
            transform-style: preserve-3d;
            transition: transform 0.3s ease-out;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .bow {
            position: absolute;
            font-size: 45px;
            color: #ff69b4;
            animation: floatBow 3s ease-in-out infinite;
            z-index: 11;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2));
        }
        .bow-tl { top: -20px; left: -15px; transform: rotate(-15deg); animation-delay: 0s; }
        .bow-tr { top: -20px; right: -15px; transform: rotate(15deg); animation-delay: 1.5s; }

        @keyframes floatBow {
            0%, 100% { transform: translateY(0) rotate(-15deg); }
            50% { transform: translateY(-12px) rotate(-10deg); }
        }

        /* Hello Kitty Image */
        .hello-kitty-img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin: 20px auto;
            display: block;
            border-radius: 50%;
            border: 6px solid #ffb6c1;
            padding: 5px;
            background: white;
            box-shadow: 0 8px 30px rgba(255, 182, 193, 0.5);
            animation: rotateGlow 8s linear infinite;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); box-shadow: 0 8px 25px rgba(255, 182, 193, 0.5); }
            50% { box-shadow: 0 8px 40px rgba(255, 105, 180, 0.7); }
            100% { transform: rotate(360deg); box-shadow: 0 8px 25px rgba(255, 182, 193, 0.5); }
        }

        /* Fallback если картинка не загрузится */
        .hello-kitty-fallback {
            width: 150px;
            height: 150px;
            margin: 20px auto;
            background: linear-gradient(135deg, #fff 0%, #fff0f5 100%);
            border-radius: 50%;
            border: 6px solid #ffb6c1;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            box-shadow: 0 8px 30px rgba(255, 182, 193, 0.5);
            animation: rotateGlow 8s linear infinite;
            position: relative;
        }

        .hello-kitty-fallback::before {
            content: '🎀';
            position: absolute;
            top: 15px;
            right: 30px;
            font-size: 30px;
            animation: bowWiggle 2s ease-in-out infinite;
        }

        @keyframes bowWiggle {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #ff1493;
            font-size: 2rem;
            margin: 15px 0;
            text-shadow: 2px 2px 0px #ffb6c1, 4px 4px 0px rgba(255, 182, 193, 0.3);
            line-height: 1.3;
            -webkit-user-select: text;
            user-select: text;
            opacity: 0;
            animation: fadeInScale 1.5s ease forwards;
            animation-delay: 0.5s;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .subtitle {
            font-size: 1.1rem;
            color: #777;
            margin-bottom: 25px;
            opacity: 0;
            animation: fadeIn 1s ease forwards;
            animation-delay: 2s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reasons-box {
            margin-top: 25px;
            text-align: left;
            min-height: 50px;
            width: 100%;
            position: relative;
        }

        .reason-card {
            background: linear-gradient(135deg, #fff0f5 0%, #ffe6f0 100%);
            border-left: 6px solid #ff69b4;
            padding: 18px;
            margin-bottom: 18px;
            border-radius: 15px;
            opacity: 0;
            transform: translateX(-40px) scale(0.95);
            transition: all 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 5px 20px rgba(255, 182, 193, 0.3);
            word-wrap: break-word;
            -webkit-user-select: text;
            user-select: text;
            position: relative;
            overflow: hidden;
        }

        .reason-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.5s, transform 0.5s;
        }

        .reason-card:hover::before {
            opacity: 1;
            transform: scale(1);
        }

        .reason-card.visible {
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        .reason-card span {
            font-weight: bold;
            color: #ff1493;
            font-size: 1.3rem;
            margin-right: 10px;
            display: inline-block;
            animation: bounceNum 2s infinite;
        }

        @keyframes bounceNum {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-6px);}
            60% {transform: translateY(-3px);}
        }

        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #fff 0%, #ff69b4 100%);
            border-radius: 50%;
            pointer-events: none;
            animation: sparkleAnim 1.5s ease-out forwards;
            box-shadow: 0 0 10px #ff69b4;
        }

        @keyframes sparkleAnim {
            0% { opacity: 1; transform: scale(0) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.5) rotate(180deg); }
            100% { opacity: 0; transform: scale(0.5) rotate(360deg); }
        }

        button {
            background: linear-gradient(45deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            padding: 20px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Varela Round', sans-serif;
            margin-top: 20px;
            width: 100%;
            max-width: 320px;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.5);
            animation: pulseBtn 2s infinite, breathe 3s ease-in-out infinite;
            -webkit-appearance: none;
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 105, 180, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255, 105, 180, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 105, 180, 0); }
        }

        @keyframes breathe {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.15); }
        }

        button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.3s, transform 0.3s;
        }

        button:active::after {
            opacity: 1;
            transform: scale(1);
        }

        button:active {
            transform: scale(0.95);
        }

        .explosion-heart {
            position: fixed;
            font-size: 35px;
            z-index: 100;
            pointer-events: none;
            animation: explode 1.2s ease-out forwards;
            filter: drop-shadow(0 0 10px rgba(255, 105, 180, 0.8));
        }

        @keyframes explode {
            0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(720deg); opacity: 0; }
        }

        @media screen and (max-width: 375px) {
            h1 { font-size: 1.7rem; }
            .hello-kitty-img, .hello-kitty-fallback { width: 130px; height: 130px; font-size: 70px; }
            button { font-size: 1.1rem; padding: 18px 30px; }
        }
    </style>
</head>
<body>

    <div id="bg-hearts"></div>

    <div class="container" id="mainContainer">
        <div class="bow bow-tl">🎀</div>
        <div class="bow bow-tr">🎀</div>

        <!-- Hello Kitty Image с fallback -->
        <img src="https://upload.wikimedia.org/wikipedia/en/0/05/Hello_kitty_character_portrait.png" 
             alt="Hello Kitty" 
             class="hello-kitty-img" 
             id="hkImage"
             onerror="showFallback()"
             crossorigin="anonymous">
        
        <div class="hello-kitty-fallback" id="hkFallback">
            🐱
        </div>

        <h1>Привет, мое солнышко! 🌸</h1>
        <p class="subtitle">Нажимай кнопку, чтобы узнать причину почему я тебя люблю...</p>

        <div class="reasons-box" id="reasonsContainer"></div>

        <button id="actionBtn" onclick="showNextReason(event)" ontouchstart="showNextReason(event)">Узнать причину ❤️</button>
    </div>

    <script>
        const reasons = [
            "Твоя улыбка освещает мой день ☀️",
            "Ты готовишь самые вкусные блины) ☕",
            "С тобой мне всегда уютно и спокойно 🏠",
            "Твой запах сводит меня с ума",
            "Твои глаза — самые красивые в мире 👀",
            "Ты делаешь меня лучше каждый день 🚀",
            "Я люблю, как ты смеешься 😂",
            "Ты моя самая лучшая девушка 👯‍♀️",
            "Просто потому что это ТЫ! 💖"
        ];

        let currentIndex = 0;
        let isProcessing = false;
        const container = document.getElementById('reasonsContainer');
        const btn = document.getElementById('actionBtn');
        const mainContainer = document.getElementById('mainContainer');
        const hkImage = document.getElementById('hkImage');
        const hkFallback = document.getElementById('hkFallback');

        // Fallback если картинка не загрузится
        function showFallback() {
            hkImage.style.display = 'none';
            hkFallback.style.display = 'flex';
        }

        // Пробуем загрузить картинку с таймаутом
        window.addEventListener('load', function() {
            setTimeout(function() {
                if (!hkImage.complete || hkImage.naturalHeight === 0) {
                    showFallback();
                }
            }, 3000);
        });

        // Параллакс эффект для iPhone
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', function(event) {
                const tiltX = (event.gamma || 0) * 0.3;
                const tiltY = (event.beta || 0) * 0.3;
                
                mainContainer.style.transform = `rotateY(${tiltX}deg) rotateX(${-tiltY}deg)`;
            });
        }

        function showNextReason(event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            
            if (isProcessing) return;
            isProcessing = true;

            if (currentIndex < reasons.length) {
                const card = document.createElement('div');
                card.classList.add('reason-card');
                card.innerHTML = '<span>' + (currentIndex + 1) + '.</span> ' + reasons[currentIndex];
                container.appendChild(card);

                createSparkles(card);

                setTimeout(() => {
                    card.classList.add('visible');
                }, 100);

                currentIndex++;

                setTimeout(() => {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);

                if (currentIndex === reasons.length) {
                    btn.innerHTML = "Я люблю тебя бесконечно! ❤️";
                    btn.style.background = "linear-gradient(45deg, #ff1493, #dc143c)";
                    btn.style.animation = "none";
                    btn.onclick = null;
                    btn.ontouchstart = null;
                    createExplosion();
                }
            }

            setTimeout(() => {
                isProcessing = false;
            }, 400);
        }

        function createSparkles(element) {
            const rect = element.getBoundingClientRect();
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.classList.add('sparkle');
                    
                    const x = Math.random() * rect.width;
                    const y = Math.random() * rect.height;
                    
                    sparkle.style.left = (rect.left + x) + 'px';
                    sparkle.style.top = (rect.top + y) + 'px';
                    
                    document.body.appendChild(sparkle);
                    
                    setTimeout(() => sparkle.remove(), 1500);
                }, i * 50);
            }
        }

        function createBgHearts() {
            const heartContainer = document.getElementById('bg-hearts');
            const hearts = ['❤️', '💖', '', '💓', '', '🌸', '✨'];
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('bg-heart');
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
                heart.style.animationDuration = (Math.random() * 4 + 6) + 's';
                heart.style.opacity = Math.random() * 0.4 + 0.6;
                heartContainer.appendChild(heart);

                setTimeout(() => heart.remove(), 10000);
            }, 300);
        }

        createBgHearts();

        function createExplosion() {
            const hearts = ['❤️', '💖', '💗', '💓', '💕', '🌸', '', '✨'];
            
            for(let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('explosion-heart');
                    heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                    
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * 350 + 150;
                    const tx = Math.cos(angle) * distance;
                    const ty = Math.sin(angle) * distance;
                    
                    heart.style.setProperty('--tx', tx + 'px');
                    heart.style.setProperty('--ty', ty + 'px');
                    heart.style.left = '50%';
                    heart.style.top = '50%';
                    heart.style.fontSize = (Math.random() * 40 + 25) + 'px';
                    
                    document.body.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 1200);
                }, i * 25);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            console.log('Site loaded successfully with Hello Kitty!');
        });
    </script>
</body>
</html>
